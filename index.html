<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gülbahar</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #e0f2fe; /* Göz yormayan açık mavi arka plan */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #333;
        }

        /* 3D Yüzen Elementler (Kalpler ve Balonlar) Container */
        #floating-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none; /* Pointerları iç öğelere aktaracağız */
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.75);
            padding: 2.5rem 3.5rem;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(14, 165, 233, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.9);
            animation: fadeIn 1.5s ease-out;
            max-width: 800px;
            width: 90%;
            margin: 2rem 0;
        }

        .profile-wrapper {
            width: 140px;
            height: 140px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            padding: 6px;
            background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
            box-shadow: 0 10px 25px rgba(14, 165, 233, 0.4);
            animation: bounceIn 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .profile-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #fff;
            background-color: #fff;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 25%;
            transform: scale(1.5); /* Sadece kafası görünecek şekilde zoom yapar */
            transition: transform 0.3s ease;
        }
        
        .profile-wrapper:hover .profile-img {
            transform: scale(1.6);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            color: #0284c7;
            text-shadow: 2px 2px 4px rgba(2, 132, 199, 0.2);
            font-weight: 800;
        }

        .chart-container {
            margin: 0 auto 2rem;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid rgba(14, 165, 233, 0.3);
            box-shadow: 0 5px 15px rgba(14, 165, 233, 0.2);
            background: #fff;
            padding: 10px;
        }
        
        .chart-container img {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-radius: 10px;
            display: block;
            margin: 0 auto;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        .row-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 0.9rem 2.2rem;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #38bdf8, #0ea5e9);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 8px 15px rgba(14, 165, 233, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-purple {
            background: linear-gradient(45deg, #c084fc, #9333ea);
            box-shadow: 0 8px 15px rgba(147, 51, 234, 0.3);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            transition: left 0.6s ease;
        }

        .btn:hover::after {
            left: 150%;
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 12px 20px rgba(14, 165, 233, 0.5);
        }

        .btn-purple:hover {
            box-shadow: 0 12px 20px rgba(147, 51, 234, 0.5);
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* YÜZEN 3D OBJELER (Kalpler ve Balonlar) */
        .floater {
            position: absolute;
            bottom: -150px;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.3s ease;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* 3D Balon Stili (Mavi tonlar) */
        .balloon {
            width: 60px;
            height: 70px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            background: radial-gradient(circle at 30% 30%, #fff 0%, #7dd3fc 20%, #0ea5e9 80%, #0369a1 100%);
            box-shadow: 
                inset -5px -5px 15px rgba(0,0,0,0.1),
                0 15px 15px rgba(14, 165, 233, 0.3);
            position: relative;
        }
        .balloon::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: #0ea5e9;
            border-radius: 5px;
        }

        /* 3D Kalp Stili (Pembe/Mor kalsın ki renklilik katsın veya mavi yapalım) */
        .heart {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 30% 30%, #fff 0%, #f472b6 20%, #ec4899 80%, #be185d 100%);
            transform: rotate(-45deg);
            box-shadow: -5px 10px 15px rgba(236, 72, 153, 0.3);
            border-radius: 5px 50px 50px 5px; 
        }
        
        .heart-shape {
            position: relative;
            width: 50px;
            height: 50px;
        }
        .heart-shape::before,
        .heart-shape::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 80px;
            border-radius: 50px 50px 0 0;
            background: linear-gradient(135deg, #f472b6 0%, #ec4899 60%, #be185d 100%);
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.1);
        }
        .heart-shape::before {
            left: 50px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }
        .heart-shape::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        .pop {
            transform: scale(1.5) !important;
            opacity: 0 !important;
            filter: brightness(1.5);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) translateX(var(--drift)) rotate(var(--rot)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="floating-layer"></div>
    
    <div class="container">
        <div class="profile-wrapper">
            <div class="profile-inner">
                <img src="Depo/profil_fotografi.jpg" alt="Profil Fotoğrafı" class="profile-img" onerror="this.src='https://via.placeholder.com/150?text=Resim+Yok'">
            </div>
        </div>
        
        <h1>Gülbahar</h1>
        
        <!-- Grafiğin Görüntülendiği Alan -->
        <div class="chart-container">
            <img src="Hafta 3/veri_gorseli.png" alt="Veri Görseli" onerror="this.style.display='none';">
        </div>
        
        <div class="btn-group">
            <!-- Ana Renk.html Butonu -->
            <a href="Depo/renk.html" class="btn btn-purple">Renk Sayfasına Git</a>
            
            <div class="row-buttons">
                <!-- Diğer dosyalara linklenen butonlar -->
                <a href="Hafta 3/veri_gorseli.png" class="btn" target="_blank">Grafik</a>
                <a href="Hafta 3/data.csv" class="btn">Data</a>
                <a href="tabu_oyunu/index.html" class="btn">Tabu Oyunu</a>
            </div>
        </div>
    </div>

    <script>
        const layer = document.getElementById('floating-layer');
        const types = ['balloon', 'heart', 'heart', 'heart', 'heart']; // Daha fazla kalp

        function createFloater() {
            const el = document.createElement('div');
            el.className = 'floater';
            
            const type = types[Math.floor(Math.random() * types.length)];
            
            if(type === 'balloon') {
                el.classList.add('balloon');
            } else {
                const heartGfx = document.createElement('div');
                heartGfx.className = 'heart-shape';
                el.appendChild(heartGfx);
            }

            const scale = Math.random() * 0.8 + 0.6; 
            const startX = Math.random() * window.innerWidth;
            el.style.left = startX + 'px';
            
            const duration = Math.random() * 8 + 7; 
            const drift = (Math.random() * 200 - 100) + 'px'; 
            const rot = (Math.random() * 40 - 20) + 'deg'; 
            
            el.style.setProperty('--drift', drift);
            el.style.setProperty('--rot', rot);
            el.style.transform = `scale(${scale})`; 
            el.style.animation = `floatUp ${duration}s ease-in forwards`;
            
            const popEffect = () => {
                if(el.classList.contains('pop')) return;
                el.style.animationPlayState = 'paused';
                el.classList.add('pop');
                setTimeout(() => {
                    if(el.parentNode) {
                        layer.removeChild(el);
                    }
                }, 300); 
            };

            el.addEventListener('mouseenter', popEffect);
            el.addEventListener('touchstart', popEffect, {passive: true});

            layer.appendChild(el);

            setTimeout(() => {
                if(el.parentNode) {
                    layer.removeChild(el);
                }
            }, duration * 1000);
        }

        // Çok daha sık balon/kalp oluştur
        setInterval(createFloater, 300);

        // Sayfa yüklendiğinde havayı iyice doldur
        for(let i=0; i<25; i++) {
            setTimeout(createFloater, i * 150);
        }
    </script>
</body>
</html>
